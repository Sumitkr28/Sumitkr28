<svg width="920" height="288" viewBox="0 0 920 288" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Currently building: AI agents with MCP + Claude; RAG pipelines and LLM integration">
  <defs>
    <linearGradient id="cb-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#bb86fc"/>
      <stop offset="1" stop-color="#d8b9ff"/>
    </linearGradient>
    <filter id="cb-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .cb-mono{font-family:'JetBrains Mono','IBM Plex Mono',ui-monospace,'Courier New',monospace}
      .cb-sans{font-family:'IBM Plex Sans',-apple-system,'Segoe UI',sans-serif}
      @keyframes cb-pulse{0%,100%{opacity:.75}50%{opacity:1}}
      .cb-dot{animation:cb-pulse 2.6s ease-in-out infinite}
    </style>
  </defs>

  <rect x="0" y="0" width="920" height="288" fill="#0d1117"/>

  <!-- section header -->
  <circle class="cb-dot" cx="22" cy="34" r="7" fill="#bb86fc" filter="url(#cb-glow)"/>
  <text class="cb-mono" x="42" y="41" font-size="18" letter-spacing="3" fill="#8b949e">CURRENTLY BUILDING</text>
  <line x1="320" y1="34" x2="898" y2="34" stroke="#21262d" stroke-width="1"/>

  <!-- Card 1 -->
  <rect x="26" y="70" width="420" height="180" rx="16" fill="#11161d" stroke="#21262d" stroke-width="1"/>
  <text class="cb-sans" x="52" y="126" font-size="26" font-weight="600" fill="#e6edf3">AI agents with MCP + Claude</text>
  <text class="cb-mono" x="52" y="162" font-size="14" fill="#6e7681">tool calling · orchestration · automation</text>
  <rect x="52" y="198" width="368" height="14" rx="7" fill="#21262d"/>
  <rect x="52" y="198" width="239" height="14" rx="7" fill="url(#cb-bar)" filter="url(#cb-glow)"/>

  <!-- Card 2 -->
  <rect x="474" y="70" width="420" height="180" rx="16" fill="#11161d" stroke="#21262d" stroke-width="1"/>
  <text class="cb-sans" x="500" y="126" font-size="26" font-weight="600" fill="#e6edf3">RAG pipelines &amp; LLM integration</text>
  <text class="cb-mono" x="500" y="162" font-size="14" fill="#6e7681">FAISS · embeddings · LLaMA / Claude</text>
  <rect x="500" y="198" width="368" height="14" rx="7" fill="#21262d"/>
  <rect x="500" y="198" width="202" height="14" rx="7" fill="url(#cb-bar)" filter="url(#cb-glow)"/>
</svg>
