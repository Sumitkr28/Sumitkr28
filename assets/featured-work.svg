<svg width="1000" height="250" viewBox="0 0 1000 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Featured work: Zora AI; SaceTrace">
  <defs>
    <filter id="fw-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .fw-mono{font-family:'JetBrains Mono','IBM Plex Mono',ui-monospace,'Courier New',monospace}
      .fw-sans{font-family:'IBM Plex Sans',-apple-system,'Segoe UI',sans-serif}
      @keyframes fw-pulse{0%,100%{opacity:.75}50%{opacity:1}}
      .fw-dot{animation:fw-pulse 2.6s ease-in-out infinite}
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="250" fill="#0d1117"/>

  <!-- section header -->
  <circle class="fw-dot" cx="20" cy="30" r="6" fill="#bb86fc" filter="url(#fw-glow)"/>
  <text class="fw-mono" x="40" y="37" font-size="18" letter-spacing="3" fill="#d2a8ff">FEATURED WORK</text>
  <line x1="250" y1="30" x2="980" y2="30" stroke="#21262d" stroke-width="1"/>

  <!-- Card 1 — Zora AI (featured) -->
  <rect x="10" y="62" width="475" height="170" rx="16" fill="#15121e" stroke="#8b5cf6" stroke-width="1"/>
  <text class="fw-mono" x="36" y="106" font-size="18" font-weight="600" fill="#d2a8ff">Zora AI <tspan fill="#bb86fc">★</tspan></text>
  <text class="fw-sans" x="36" y="138" font-size="14" fill="#8b949e">AI assistant / agent platform — conversational</text>
  <text class="fw-sans" x="36" y="160" font-size="14" fill="#8b949e">automation powered by LLMs.</text>
  <circle cx="40" cy="198" r="4.5" fill="#bb86fc"/>
  <text class="fw-mono" x="52" y="202" font-size="13" fill="#6e7681"><tspan fill="#adbac7">Python</tspan>   LLM · Agents</text>

  <!-- Card 2 — SaceTrace (featured) -->
  <rect x="515" y="62" width="475" height="170" rx="16" fill="#15121e" stroke="#8b5cf6" stroke-width="1"/>
  <text class="fw-mono" x="541" y="106" font-size="18" font-weight="600" fill="#d2a8ff">SaceTrace <tspan fill="#bb86fc">★</tspan></text>
  <text class="fw-sans" x="541" y="138" font-size="14" fill="#8b949e">Intelligent tracing &amp; analytics for data</text>
  <text class="fw-sans" x="541" y="160" font-size="14" fill="#8b949e">pipelines and ML workflows.</text>
  <circle cx="545" cy="198" r="4.5" fill="#bb86fc"/>
  <text class="fw-mono" x="557" y="202" font-size="13" fill="#6e7681"><tspan fill="#adbac7">Python</tspan>   Data · ML</text>
</svg>
