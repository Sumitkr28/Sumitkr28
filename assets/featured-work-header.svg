<svg width="1000" height="54" viewBox="0 0 1000 54" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Featured work">
  <defs>
    <filter id="fwh-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .fwh-mono{font-family:'JetBrains Mono','IBM Plex Mono',ui-monospace,'Courier New',monospace}
      @keyframes fwh-pulse{0%,100%{opacity:.75}50%{opacity:1}}
      .fwh-dot{animation:fwh-pulse 2.6s ease-in-out infinite}
    </style>
  </defs>
  <rect x="0" y="0" width="1000" height="54" fill="#0d1117"/>
  <circle class="fwh-dot" cx="20" cy="28" r="6" fill="#bb86fc" filter="url(#fwh-glow)"/>
  <text class="fwh-mono" x="40" y="35" font-size="18" letter-spacing="3" fill="#d2a8ff">FEATURED WORK</text>
  <line x1="250" y1="28" x2="980" y2="28" stroke="#21262d" stroke-width="1"/>
</svg>
