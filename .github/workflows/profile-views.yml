name: Update profile-views SVG

on:
  schedule:
    - cron: '0 6 * * *'      # once a day (06:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-views
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Regenerate assets/profile-views.svg
        run: node scripts/gen-profile-views.mjs
      - name: Commit if changed
        run: |
          git config user.name  "Sumitkr28"
          git config user.email "sumitchoudhary2812@gmail.com"
          if [ -n "$(git status --porcelain assets/profile-views.svg)" ]; then
            git add assets/profile-views.svg
            git commit -m "Refresh profile views"
            git push
          else
            echo "No change in view count."
          fi
